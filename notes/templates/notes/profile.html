<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>

    <style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial,sans-serif;
    }

    body{
        background:#07142b;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:40px;
    }

    .container{
        width:700px;
        background:white;
        border-radius:20px;
        padding:40px;
        box-shadow:0 10px 25px rgba(0,0,0,0.3);
    }

    h1{
        text-align:center;
        color:#07142b;
        margin-bottom:30px;
    }

    .profile-card{
        background:#f4f6f9;
        padding:25px;
        border-radius:15px;
    }

    .row{
        margin-bottom:20px;
    }

    .label{
        font-weight:bold;
        color:#555;
        margin-bottom:5px;
    }

    .value{
        font-size:18px;
        color:#111;
    }

    .buttons{
        display:flex;
        gap:15px;
        margin-top:30px;
    }

    .btn{
        flex:1;
        text-decoration:none;
        text-align:center;
        padding:14px;
        color:white;
        border-radius:10px;
    }

    .dashboard{
        background:#2563eb;
    }

    .notes{
        background:#22c55e;
    }

    .logout{
        background:#dc2626;
    }

    </style>

</head>
<body>

<div class="container">

    <h1>👤 My Profile</h1>

    <div class="profile-card">

        <div class="row">

            <div class="label">
                Username
            </div>

            <div class="value">
                {{ user.username }}
            </div>

        </div>

        <div class="row">

            <div class="label">
                Email
            </div>

            <div class="value">
                {{ user.email }}
            </div>

        </div>

        <div class="row">

            <div class="label">
                Date Joined
            </div>

            <div class="value">
                {{ user.date_joined }}
            </div>

        </div>

        <div class="row">

            <div class="label">
                Notes Uploaded
            </div>

            <div class="value">
                {{ notes_count }}
            </div>

        </div>

    </div>

    <div class="buttons">

        <a
           href="/dashboard/"
           class="btn dashboard">

           Dashboard

        </a>

        <a
           href="/my-notes/"
           class="btn notes">

           My Notes

        </a>

        <a
           href="/logout/"
           class="btn logout">

           Logout

        </a>

    </div>

</div>

</body>
</html>
