<!DOCTYPE html>
<html>
<head>
    <title>Upload Notes</title>

    <style>

    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial,sans-serif;
    }

    body{
        background:#07142b;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        padding:40px;
    }

    .container{
        width:700px;
        background:white;
        padding:40px;
        border-radius:20px;
        box-shadow:0 10px 25px rgba(0,0,0,0.3);
    }

    h1{
        text-align:center;
        color:#07142b;
        margin-bottom:30px;
    }

    .form-group{
        margin-bottom:20px;
    }

    label{
        display:block;
        margin-bottom:8px;
        font-weight:bold;
    }

    input[type="text"],
    textarea,
    select,
    input[type="file"]{

        width:100%;
        padding:12px;
        border:1px solid #ccc;
        border-radius:8px;
        font-size:16px;

    }

    textarea{
        min-height:180px;
        resize:vertical;
    }

    button{
        width:100%;
        background:#22c55e;
        color:white;
        border:none;
        padding:14px;
        border-radius:10px;
        font-size:16px;
        cursor:pointer;
    }

    button:hover{
        background:#16a34a;
    }

    .back-btn{
        display:block;
        text-align:center;
        margin-top:15px;
        text-decoration:none;
        background:#2563eb;
        color:white;
        padding:12px;
        border-radius:10px;
    }

    </style>

</head>
<body>

<div class="container">

    <h1>📤 Upload Notes</h1>

    <form method="POST" enctype="multipart/form-data">

        {% csrf_token %}

        <div class="form-group">

            <label>Title</label>
            {{ form.title }}

        </div>

        <div class="form-group">

            <label>Description</label>
            {{ form.description }}

        </div>

        <div class="form-group">

            <label>Subject</label>
            {{ form.subject }}

        </div>

        <div class="form-group">

            <label>PDF File</label>
            {{ form.pdf }}

        </div>

        <button type="submit">
            Upload Note
        </button>

    </form>

    <a href="/dashboard/" class="back-btn">
        Back to Dashboard
    </a>

</div>

</body>
</html>
